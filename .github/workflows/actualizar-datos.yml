name: Actualizar datos de incendios

on:
  schedule:
    # Corre todos los lunes a las 6 AM UTC (3 AM Argentina)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # permite correrlo manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install shapely

      - name: Regenerar recurrencia
        run: python generar_recurrencia.py

      - name: Regenerar casos de alerta
        run: python generar_casos_alerta.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recurrencia.geojson data/casos_alerta.json
          git diff --staged --quiet || git commit -m "chore: actualizar recurrencia y casos de alerta [bot]"
          git push
